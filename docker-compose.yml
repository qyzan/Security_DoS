version: '3.8'

services:
  securitydos:
    build: .
    container_name: securitydos
    ports:
      - "8090:8090"
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
    restart: unless-stopped
    # Default: Safe Mode (--guard). 
    # To disable (UNRESTRICTED): Uncomment the line below. 
    # WARNING: Use UNRESTRICTED mode at your own risk!
    # command: ["-config", "configs/config.yaml"]
